# 37 topic+category pairs, sourced verbatim from docs/taxonomy-draft-v1.md.
# Schema simplification vs. the earlier 18-topic version: every row here has exactly
# ONE category — `categories` is a single-item list and `primary_category` is that
# same value, full stop. (The old file's multi-tag `categories` design is no longer
# used; the same topic *name* can recur across categories, but each is authored here
# as its own fully independent row/id — see the id-naming note below.)
# `primary_category` must be one of `categories` (validated on load) — it's the single
# category the masthead counts against (e.g. "MINDSET NO. 14").
# Health topics carry sensitivity: health + requires_citation: true — no factual claim
# about the body is ever made without a grounded source (blueprint Section 1, rule 6).
# requires_citation/knowledge_hints follow the draft doc's "Fact-check" marking exactly.

