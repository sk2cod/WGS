# 18 starter topics across WGS's seven categories.
# `primary_category` must be one of `categories` (validated on load) — it's the single
# category the masthead counts against (e.g. "MINDSET NO. 14").
# Health topics carry sensitivity: health + requires_citation: true — no factual claim
# about the body is ever made without a grounded source (blueprint Section 1, rule 6).

- id: mindset-reframing-self-doubt
  name: Reframing Self-Doubt
  categories: ["Mindset"]
  primary_category: "Mindset"
  tone_defaults: ["warm", "grounded"]
  suitable_formats: ["carousel", "single_image"]
  seed_angles:
    - the inner critic vs. the intuition that actually protects you
    - self-doubt as a habit, not a fact
    - what confident women do differently when doubt shows up
    - the difference between healthy caution and self-sabotage
  knowledge_hints:
    - cognitive reframing techniques from CBT
    - the negativity bias and why doubt feels "truer" than praise
  requires_citation: false
  sensitivity: normal

